<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiguang-Cover</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="description" content="Shiguang-Cover：简洁的在线生成封面网站，专为博客、短视频、社交媒体等生成个性化封面">
    <meta name="keywords" content="在线封面生成器, 封面生成工具, 个性化封面设计, 封面模板, 创意封面设计, 社交媒体封面, 视觉作品封面, 快速封面生成">
    <!-- IE 淘汰 -->
    <script>
      if (false || (!!window.MSInputMethodContext && !!document.documentMode))
        window.location.href =
          'https://support.dmeng.net/upgrade-your-browser.html?referrer=' +
          encodeURIComponent(window.location.href);
    </script>
    <!-- 禁用右键 -->
    <script>
      document.oncontextmenu = function () {
        return false;
      };
    </script>
    <!-- Umami 统计（可通过环境变量配置） -->
    <script>
      (function() {
        var scriptUrl = '%VITE_UMAMI_SCRIPT_URL%';
        var websiteId = '%VITE_UMAMI_WEBSITE_ID%';
        if (scriptUrl && websiteId) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = scriptUrl;
          s.setAttribute('data-website-id', websiteId);
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <noscript>
      <div style="text-align: center">请开启 JavaScript</div>
    </noscript>
  </body>
</html>
